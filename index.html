<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals Bazaar • Best Deals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f7fa;font-family:'Segoe UI',system-ui,sans-serif;color:#1a1a2e}
    
    .topbar{background:#0f172a;color:#00e5ff;text-align:center;padding:8px;font-size:0.8rem;font-weight:600}
    
    .header{background:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
    .logo{font-size:1.6rem;font-weight:800;display:flex;align-items:center;gap:8px}
    .logo i{color:#00bcd4}
    .logo span{color:#00bcd4}
    .search-box{display:flex;background:#f1f4f9;border-radius:30px;overflow:hidden;border:2px solid transparent;transition:0.3s}
    .search-box:focus-within{border-color:#00bcd4}
    .search-box input{border:none;background:transparent;padding:10px 16px;font-size:0.9rem;width:200px;outline:none}
    .search-box button{background:#00bcd4;color:#fff;border:none;padding:10px 20px;cursor:pointer;font-weight:600}
    
    .filters{background:#fff;padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #e8ecf1;position:sticky;top:68px;z-index:90}
    .filter-btn{padding:8px 18px;border-radius:25px;border:none;cursor:pointer;font-weight:600;font-size:0.8rem;background:#f1f4f9;transition:0.2s}
    .filter-btn:hover{background:#e2e8f0}
    .filter-btn.active{background:#00bcd4;color:#fff}
    
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;padding:24px;max-width:1350px;margin:0 auto}
    
    .card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.06);transition:0.3s;border:1px solid #e8ecf1}
    .card:hover{transform:translateY(-6px);box-shadow:0 14px 30px rgba(0,188,212,0.15);border-color:#b2ebf2}
    
    .card-img{height:210px;background:#eef2f6;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .fallback{font-size:4.5rem;color:#b0bec5}
    .platform-tag{position:absolute;top:12px;left:12px;background:rgba(15,23,42,0.85);color:#fff;padding:5px 14px;border-radius:20px;font-size:0.7rem;font-weight:700;display:flex;align-items:center;gap:5px}
    .discount-tag{position:absolute;top:12px;right:12px;background:linear-gradient(135deg,#ff8f00,#e65100);color:#fff;padding:5px 12px;border-radius:20px;font-size:0.72rem;font-weight:800}
    
    .card-body{padding:16px;display:flex;flex-direction:column;flex:1}
    .card-body h3{font-size:1rem;font-weight:700;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-body .desc{color:#64748b;font-size:0.8rem;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .price-row{display:flex;align-items:baseline;gap:8px;margin:8px 0 14px}
    .price{font-size:1.5rem;font-weight:800;color:#00838f}
    .old-price{font-size:0.85rem;color:#94a3b8;text-decoration:line-through}
    .buy-btn{display:block;text-align:center;background:linear-gradient(135deg,#00bcd4,#00838f);color:#fff;padding:11px;border-radius:12px;text-decoration:none;font-weight:700;transition:0.2s;margin-top:auto}
    .buy-btn:hover{background:linear-gradient(135deg,#0097a7,#006064);box-shadow:0 6px 18px rgba(0,188,212,0.4)}
    
    .state{grid-column:1/-1;text-align:center;padding:50px;background:#fff;border-radius:18px}
    .spinner{font-size:2.5rem;color:#00bcd4;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    footer{text-align:center;padding:20px;color:#94a3b8;font-size:0.8rem;border-top:1px solid #e8ecf1}
  </style>
</head>
<body>

  <div class="topbar">
    <i class="fas fa-bolt"></i> Mega Sale Live – Up to 70% Off <i class="fas fa-bolt"></i>
  </div>

  <header class="header">
    <div class="logo">
      <i class="fas fa-bolt"></i> Deals<span>Bazar</span>
    </div>
    <div class="search-box">
      <input type="text" placeholder="Search products..." id="searchInput">
      <button onclick="filterProducts()"><i class="fas fa-search"></i> Search</button>
    </div>
  </header>

  <div class="filters" id="filterBar">
    <button class="filter-btn active" data-filter="all">🔥 All</button>
    <button class="filter-btn" data-filter="amazon"><i class="fab fa-amazon"></i> Amazon</button>
    <button class="filter-btn" data-filter="flipkart"><i class="fas fa-shopping-bag"></i> Flipkart</button>
    <button class="filter-btn" data-filter="meesho">📦 Meesho</button>
    <button class="filter-btn" data-filter="myntra">👗 Myntra</button>
    <button class="filter-btn" data-filter="other">🛍️ Others</button>
  </div>

  <div class="products-grid" id="productsGrid">
    <div class="state">
      <div class="spinner"><i class="fas fa-circle-notch"></i></div>
      <h3 style="margin-top:12px;">Loading Hot Deals...</h3>
    </div>
  </div>

  <footer>© 2026 DealsBazaar • Affiliate Store</footer>

  <script>
    // ✅ GOOGLE APPS SCRIPT URL
    var API_URL = 'https://script.google.com/macros/s/AKfycbyMC7iu3ukzfzBEoj2lFZL_2Gc-JrAxauVU9FpA2g5QYb_omA7BcUXPNpHdvyCawnBJqA/exec';
    
    var allProducts = [];
    var currentFilter = 'all';

    // 🔧 FIX: Safe string conversion function
    function toStr(val, defaultVal) {
      if (val === undefined || val === null) return defaultVal || '';
      return String(val).trim();
    }

    function escapeHTML(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadProducts() {
      try {
        var res = await fetch(API_URL + '?action=getProducts');
        var data = await res.json();
        
        if (Array.isArray(data)) {
          allProducts = data.filter(function(p) { 
            return p && p.title && toStr(p.title) !== ''; 
          });
          renderProducts(allProducts);
        } else {
          throw new Error('Invalid data format');
        }
      } catch(err) {
        document.getElementById('productsGrid').innerHTML = 
          '<div class="state"><h3>⚠️ Failed to load</h3><p>'+err.message+'</p><button onclick="loadProducts()" style="margin-top:10px;padding:10px 24px;background:#00bcd4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;">🔄 Retry</button></div>';
      }
    }

    function renderProducts(products) {
      var grid = document.getElementById('productsGrid');
      
      if (!products.length) {
        grid.innerHTML = '<div class="state"><h3>📭 No products found</h3><p>Check back later for amazing deals!</p></div>';
        return;
      }

      var html = '';
      var reversed = products.slice().reverse();
      
      reversed.forEach(function(p) {
        var title = escapeHTML(toStr(p.title, 'No Title'));
        var desc = escapeHTML(toStr(p.description, ''));
        var platform = escapeHTML(toStr(p.platform, 'Store'));
        
        // 🔧 FIX: Convert to string first, then clean
        var price = toStr(p.price, '299');
        price = price.replace(/[^\d.]/g, '');
        if (!price) price = '299';
        
        var oldPrice = toStr(p.oldPrice, '');
        oldPrice = oldPrice.replace(/[^\d.]/g, '');
        
        var discount = toStr(p.discount, '');
        var imgUrl = toStr(p.image, '');
        var link = toStr(p.link, '#');
        
        var hasImg = imgUrl && (imgUrl.indexOf('http://') === 0 || imgUrl.indexOf('https://') === 0);
        
        var imgHTML = hasImg 
          ? '<img src="'+imgUrl+'" alt="'+title+'" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=fallback><i class=fas fa-image></i></div>\'">' 
          : '<div class="fallback"><i class="fas fa-image"></i></div>';
        
        var platLower = platform.toLowerCase();
        var platIcon = 'fas fa-store';
        if (platLower.indexOf('amazon') > -1) platIcon = 'fab fa-amazon';
        else if (platLower.indexOf('flipkart') > -1) platIcon = 'fas fa-shopping-bag';
        
        var discountHTML = discount ? '<span class="discount-tag">'+discount+'</span>' : '';
        var showOld = oldPrice && oldPrice !== price;
        var shortDesc = desc.length > 80 ? desc.substring(0,80)+'...' : desc;
        
        html += '<div class="card">'+
          '<div class="card-img">'+
            '<span class="platform-tag"><i class="'+platIcon+'"></i> '+platform+'</span>'+
            discountHTML+
            imgHTML+
          '</div>'+
          '<div class="card-body">'+
            '<h3>'+title+'</h3>'+
            (desc ? '<p class="desc">'+shortDesc+'</p>' : '')+
            '<div class="price-row">'+
              '<span class="price">₹'+price+'</span>'+
              (showOld ? '<span class="old-price">₹'+oldPrice+'</span>' : '')+
            '</div>'+
            '<a href="'+link+'" target="_blank" rel="noopener" class="buy-btn">'+
              '<i class="fas fa-shopping-cart"></i> View Deal'+
            '</a>'+
          '</div>'+
        '</div>';
      });
      
      grid.innerHTML = html;
    }

    function filterProducts() {
      var search = document.getElementById('searchInput').value.toLowerCase().trim();
      var filtered = allProducts.slice();
      
      if (currentFilter === 'amazon') {
        filtered = filtered.filter(function(p) { return toStr(p.platform).toLowerCase().indexOf('amazon') > -1; });
      } else if (currentFilter === 'flipkart') {
        filtered = filtered.filter(function(p) { return toStr(p.platform).toLowerCase().indexOf('flipkart') > -1; });
      } else if (currentFilter === 'meesho') {
        filtered = filtered.filter(function(p) { return toStr(p.platform).toLowerCase().indexOf('meesho') > -1; });
      } else if (currentFilter === 'myntra') {
        filtered = filtered.filter(function(p) { return toStr(p.platform).toLowerCase().indexOf('myntra') > -1; });
      } else if (currentFilter === 'other') {
        filtered = filtered.filter(function(p) {
          var plat = toStr(p.platform).toLowerCase();
          return plat.indexOf('amazon') === -1 && plat.indexOf('flipkart') === -1 && plat.indexOf('meesho') === -1 && plat.indexOf('myntra') === -1;
        });
      }
      
      if (search) {
        filtered = filtered.filter(function(p) {
          return toStr(p.title).toLowerCase().indexOf(search) > -1 || 
                 toStr(p.description).toLowerCase().indexOf(search) > -1;
        });
      }
      
      renderProducts(filtered);
    }

    document.getElementById('filterBar').addEventListener('click', function(e) {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-filter');
        filterProducts();
      }
    });

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') filterProducts();
    });

    loadProducts();
  </script>
</body>
</html>
